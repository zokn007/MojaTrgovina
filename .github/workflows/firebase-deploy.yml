name: Firebase production deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate project files
        shell: bash
        run: |
          set -euo pipefail
          for file in index.html firebase.json firestore.rules; do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing required file: $file"
              exit 1
            fi
          done

      - name: Validate Firebase service account secret
        shell: bash
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOJATRGOVINA }}
        run: |
          set -euo pipefail

          if [[ -z "${FIREBASE_CREDENTIALS:-}" ]]; then
            echo "::error::GitHub secret FIREBASE_SERVICE_ACCOUNT_MOJATRGOVINA is missing or empty."
            echo "::error::Create it under Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

          node -e '
            const raw = process.env.FIREBASE_CREDENTIALS;
            let data;
            try {
              data = JSON.parse(raw);
            } catch {
              console.error("::error::The secret is not valid JSON. Paste the complete service-account JSON from the first { to the final }.");
              process.exit(1);
            }
            const required = ["type", "project_id", "private_key", "client_email"];
            const missing = required.filter((key) => !data[key]);
            if (missing.length) {
              console.error(`::error::The service-account JSON is missing: ${missing.join(", ")}`);
              process.exit(1);
            }
            if (data.project_id !== "mojatrgovina-35fd1") {
              console.error(`::error::Wrong Firebase project in secret: ${data.project_id}. Expected mojatrgovina-35fd1.`);
              process.exit(1);
            }
            console.log(`Service account found for project: ${data.project_id}`);
          '

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MOJATRGOVINA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest

      - name: Verify authentication
        shell: bash
        run: |
          set -euo pipefail
          test -n "${GOOGLE_APPLICATION_CREDENTIALS:-}"
          test -f "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase projects:list --non-interactive >/dev/null
          echo "Firebase authentication works."

      - name: Deploy Hosting and Firestore rules
        shell: bash
        run: |
          set -euo pipefail
          firebase deploy \
            --only hosting,firestore:rules \
            --project mojatrgovina-35fd1 \
            --non-interactive
